name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Newer pushes to a PR cancel in-flight runs of the same ref so we don't
# burn CI minutes on superseded commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only GITHUB_TOKEN for every job. Any job needing
# more scope opts in explicitly (none in this workflow — CI just
# builds and runs tests).
permissions:
  contents: read

jobs:
  # Full build with FFmpeg/libass via vcpkg. /W4 /WX is set in
  # cmake/compile_options.cmake so any new warning fails the build, and
  # the POST_BUILD verify_binary.ps1 step rejects the link if any
  # exploit mitigation is missing or a forbidden UI-framework DLL has
  # snuck into the import table.
  build:
    name: Build (${{ matrix.config }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-vcpkg

      # Per-config cache for the generated VS solution + .obj outputs.
      # vcpkg_installed/ is no longer in here (setup-vcpkg caches it
      # separately), so this cache stays small and config-specific.
      # `v2-` prefix invalidates pre-relocation caches that still
      # contained vcpkg_installed inside the build tree.
      - name: Cache CMake build tree
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/vs2022-x64
          key: cmake-v2-${{ runner.os }}-${{ matrix.config }}-${{ hashFiles('CMakeLists.txt', 'src/**/CMakeLists.txt', 'cmake/**', 'vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            cmake-v2-${{ runner.os }}-${{ matrix.config }}-

      - name: Configure
        shell: pwsh
        run: cmake --preset vs2022-x64

      - name: Build (${{ matrix.config }})
        shell: pwsh
        run: cmake --build build/vs2022-x64 --config ${{ matrix.config }} --target freikino

  # GoogleTest unit tests. Uses the `vs2022-x64-tests` preset, which
  # turns on FREIKINO_BUILD_TESTS and enables the `tests` vcpkg
  # manifest feature so gtest is pulled in.
  test:
    name: Unit tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-vcpkg
        with:
          features: tests

      - name: Cache CMake build tree
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/vs2022-x64-tests
          key: cmake-v2-tests-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**/CMakeLists.txt', 'tests/**/CMakeLists.txt', 'cmake/**', 'vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            cmake-v2-tests-${{ runner.os }}-

      - name: Configure
        shell: pwsh
        run: cmake --preset vs2022-x64-tests

      - name: Build tests
        shell: pwsh
        run: cmake --build build/vs2022-x64-tests --config Debug --target freikino_tests

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir build/vs2022-x64-tests -C Debug --output-on-failure
