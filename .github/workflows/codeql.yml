name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly re-scan picks up newly disclosed CodeQL queries even
    # when the source tree is quiet.
    - cron: "37 5 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze C++
    runs-on: windows-latest
    permissions:
      # Required to upload SARIF results to the Security tab.
      security-events: write
      actions: read
      contents: read

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4

      - name: Export ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',
              process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN',
              process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Point VCPKG_ROOT at the runner-bundled vcpkg
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" |
            Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache CMake configure + build tree
        uses: actions/cache@v4
        with:
          path: build/vs2022-x64
          key: codeql-cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**/CMakeLists.txt', 'cmake/**', 'vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            codeql-cmake-${{ runner.os }}-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          # security-and-quality is the broader of the two suites — it
          # adds maintainability/correctness queries on top of the
          # security set. Worth it for a small codebase.
          queries: security-and-quality

      - name: Configure
        shell: pwsh
        run: cmake --preset vs2022-x64

      - name: Build (Release)
        shell: pwsh
        # CodeQL hooks into MSVC via its tracer, so we drive the build
        # ourselves rather than relying on autobuild — the vcpkg
        # toolchain is too custom for autobuild to discover.
        run: cmake --build build/vs2022-x64 --config Release --target freikino

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
