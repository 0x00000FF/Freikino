name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly re-scan picks up newly disclosed CodeQL queries even
    # when the source tree is quiet.
    - cron: "37 5 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only default token; the analyze job opts into the write
# scopes it actually needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze C++
    runs-on: windows-latest
    permissions:
      # Required to upload SARIF results to the Security tab.
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-vcpkg

      # CodeQL maintains its own per-job build tree (the tracer wraps
      # the compiler invocations). Cache it so a re-scan with no source
      # changes only pays the analyze step's cost.
      - name: Cache CMake build tree
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/vs2022-x64
          key: codeql-cmake-v2-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**/CMakeLists.txt', 'cmake/**', 'vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            codeql-cmake-v2-${{ runner.os }}-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          languages: c-cpp
          # security-and-quality is the broader of the two suites — it
          # adds maintainability/correctness queries on top of the
          # security set. Worth it for a small codebase.
          queries: security-and-quality
          # Scope analysis to our own sources; excludes vcpkg-installed
          # vendor headers that otherwise account for 70+ noise alerts.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Configure
        shell: pwsh
        run: cmake --preset vs2022-x64

      - name: Build (Release)
        shell: pwsh
        # CodeQL hooks into MSVC via its tracer, so we drive the build
        # ourselves rather than relying on autobuild — the vcpkg
        # toolchain is too custom for autobuild to discover.
        run: cmake --build build/vs2022-x64 --config Release --target freikino

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          category: "/language:c-cpp"
