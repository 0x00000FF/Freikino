name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_artifact_only:
        description: "Upload artifact only (don't create a GitHub Release)"
        type: boolean
        default: true

# Read-only default token; the job that publishes the release opts
# into contents:write explicitly.
permissions:
  contents: read

jobs:
  windows-x64:
    runs-on: windows-latest
    permissions:
      # softprops/action-gh-release needs contents:write to publish.
      contents: write

    strategy:
      # Keep building the other config even if one fails so a Debug-
      # only regression doesn't block a Release artifact (and vice
      # versa).
      fail-fast: false
      matrix:
        config: [Debug, Release]

    env:
      # Binary-cache vcpkg builds on the GHA cache backend so FFmpeg /
      # libass don't rebuild from source each run. `x-gha,readwrite`
      # needs ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN exported by
      # the step below — GHA doesn't expose those by default.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Export ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',
              process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN',
              process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Point VCPKG_ROOT at the runner-bundled vcpkg
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" |
            Out-File -FilePath $env:GITHUB_ENV -Append

      # Cache CMake's configure output (CMakeCache.txt, CMakeFiles,
      # generated .sln/.vcxproj, vcpkg_installed tree, previous build
      # .obj) keyed by everything the configure step actually reads:
      # every CMakeLists in the tree, the presets file, the vcpkg
      # manifest, and the shared cmake/ helpers. Source-file edits
      # don't invalidate the key — CMake rechecks stamps on its own
      # and skips re-generation when inputs are unchanged, so a
      # warm cache cuts the Configure step from ~30 s (vcpkg
      # manifest install + compiler probe + project gen) to a
      # couple of seconds, and lets the subsequent Build reuse
      # unchanged .obj files too.
      #
      # Matrix-config is part of the key (Debug and Release pick
      # up different compile flags + distinct object dirs), and a
      # restore-keys fallback matches any older entry for the same
      # config so a CMakeLists tweak is still a warm-ish build.
      - name: Cache CMake configure + build tree
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/vs2022-x64
          key: cmake-${{ runner.os }}-${{ matrix.config }}-${{ hashFiles('CMakeLists.txt', 'src/**/CMakeLists.txt', 'cmake/**', 'vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            cmake-${{ runner.os }}-${{ matrix.config }}-

      - name: Configure
        shell: pwsh
        run: cmake --preset vs2022-x64

      - name: Build (${{ matrix.config }})
        shell: pwsh
        # POST_BUILD verify_binary.ps1 runs here — build fails if any
        # exploit mitigation is missing or any forbidden UI-framework
        # DLL sneaks in.
        run: cmake --build build/vs2022-x64 --config ${{ matrix.config }} --target freikino

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage/Freikino"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $rel = "build/vs2022-x64/src/app/${{ matrix.config }}"
          Copy-Item "$rel/Freikino.exe" -Destination $stage
          # vcpkg's applocal deployment copies runtime DLLs next to
          # the exe during build; pick up whatever's there.
          Copy-Item "$rel/*.dll" -Destination $stage -ErrorAction SilentlyContinue
          # Debug build ships with the PDB so the user can symbolicate
          # crash reports without rebuilding.
          if ('${{ matrix.config }}' -eq 'Debug') {
            Copy-Item "$rel/Freikino.pdb" -Destination $stage -ErrorAction SilentlyContinue
          }
          Copy-Item "LICENSE"   -Destination $stage -ErrorAction SilentlyContinue
          Copy-Item "README.md" -Destination $stage -ErrorAction SilentlyContinue
          Write-Host "Staged files:"
          Get-ChildItem $stage | Format-Table Name, Length

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path stage/Freikino/* `
            -DestinationPath Freikino-windows-x64-${{ matrix.config }}.zip `
            -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Freikino-windows-x64-${{ matrix.config }}
          path: Freikino-windows-x64-${{ matrix.config }}.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        # softprops/action-gh-release is idempotent: the first matrix
        # job creates the release; the second appends to it. Both
        # pass `generate_release_notes: true` — only the creating run
        # takes effect, so no conflict.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: Freikino-windows-x64-${{ matrix.config }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
